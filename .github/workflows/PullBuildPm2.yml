name: Deploy to VPS - Style D

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      WORKING_DIR: /home/autem-style-d/htdocs/style-d.autem.dev
      SSH_CMD: ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}

    steps:
      # 1. Configure SSH
      - name: Configure SSH
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # 2. Clean Vite build folder
      - name: Clean build
        run: ${{ env.SSH_CMD }} "sudo -u ruddya bash -c 'rm -rf \$WORKING_DIR/build'"

      # 3. Pull latest code
      - name: Git pull
        run: ${{ env.SSH_CMD }} "sudo -u ruddya bash -c 'cd \$WORKING_DIR && git pull origin main'"

      # 4. Install dependencies with Bun
      - name: Install dependencies
        run: ${{ env.SSH_CMD }} "sudo -u ruddya bash -c 'export PATH=/home/ruddya/.bun/bin:\$PATH && cd \$WORKING_DIR && bun install'"

      # 5. Build with Vite
      - name: Build Vite app
        run: ${{ env.SSH_CMD }} "sudo -u ruddya bash -c 'export PATH=/home/ruddya/.bun/bin:\$PATH && cd \$WORKING_DIR && bun run build'"

      # 6. Reload PM2
      - name: PM2 reload
        run: ${{ env.SSH_CMD }} "sudo -u ruddya bash -c 'cd \$WORKING_DIR && pm2 reload pm2.config.cjs --update-env && pm2 save'"

      # 7. Cleanup SSH keys
      - name: Remove SSH keys
        run: rm -rf ~/.ssh
