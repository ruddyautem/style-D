name: Deploy to VPS - Style D

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/autem-style-d/htdocs/style-d.autem.dev

            echo "🧹 Cleaning build..."
            rm -rf build

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "📦 Installing dependencies..."
            export PATH=/home/ruddya/.bun/bin:\$PATH
            bun install

            echo "🔨 Building..."
            bun run build

            echo "🔄 Reloading PM2..."
            pm2 reload pm2.config.cjs --update-env
            pm2 save

            echo "✅ DEPLOY SUCCESS"
